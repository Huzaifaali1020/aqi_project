name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:

jobs:
  feature_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ CONFIG FILE (MATCHES PYTHON EXACTLY)
      - name: Create config.yaml from secrets
        run: |
          mkdir -p config
          cat <<'EOF' > config/config.yaml
          city:
            name: Karachi
            lat: 24.8607
            lon: 67.0011

          api:
            aqi_url: "https://api.waqi.info/feed/karachi/"
            aqi_key: "${{ secrets.AQI_API_KEY }}"
            weather_url: "https://api.openweathermap.org/data/2.5/weather"
            weather_key: "${{ secrets.WEATHER_API_KEY }}"

          hopsworks:
            api_key: "${{ secrets.HOPSWORKS_API_KEY }}"

          alerts:
            aqi_threshold: 150
            sender_email: "Huzaifa22.edu.pk@gmail.com"
            sender_password: "${{ secrets.EMAIL_APP_PASSWORD }}"
            receiver_email: "z04669289@gmail.com"
          EOF

      - name: Run ingestion + feature pipeline
        env:
          PYTHONPATH: .
        run: |
          python ingestion/fetch_data.py
          python pipelines/feature_engineering.py