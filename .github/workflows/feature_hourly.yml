name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:

jobs:
  feature_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ FIXED CONFIG STRUCTURE (MOST IMPORTANT STEP)
      - name: Create config.yaml from secrets
        run: |
          mkdir -p config
          cat <<EOF > config/config.yaml
          hopsworks:
            api_key: "${{ secrets.HOPSWORKS_API_KEY }}"

          location:
            city: Karachi
            lat: 24.8607
            lon: 67.0011

          api:
            aqi:
              url: "https://api.waqi.info/feed/karachi/"
              key: "${{ secrets.AQI_API_KEY }}"
            weather:
              url: "https://api.openweathermap.org/data/2.5/weather"
              key: "${{ secrets.WEATHER_API_KEY }}"
          EOF

      - name: Run ingestion + feature pipeline
        env:
          PYTHONPATH: .
        run: |
          python ingestion/fetch_data.py
          python pipelines/feature_engineering.py