# manual trigger enabled

name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  feature_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create config.yaml from secrets
        run: |
          mkdir -p config
          cat <<EOF > config/config.yaml
hopsworks:
  api_key: "${{ secrets.HOPSWORKS_API_KEY }}"
  project: "${{ secrets.HOPSWORKS_PROJECT }}"
api:
  openweather_key: "${{ secrets.OPENWEATHER_API_KEY }}"
EOF

      - name: Run ingestion + feature pipeline
        env:
          PYTHONPATH: .
        run: |
          python ingestion/fetch_data.py
          python features/feature_engineering.py