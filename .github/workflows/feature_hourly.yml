name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  feature_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Create config.yaml from secrets
        run: |
          mkdir -p config
          cat <<'EOF' > config/config.yaml
          city:
            name: Karachi
            lat: 24.8607
            lon: 67.0011

          api:
            aqi_url: "https://api.waqi.info/feed/karachi/"
            aqi_key: "${{ secrets.AQI_API_KEY }}"
            weather_url: "https://api.openweathermap.org/data/2.5/weather"
            weather_key: "${{ secrets.WEATHER_API_KEY }}"

          hopsworks:
            host: "eu-west.cloud.hopsworks.ai"
            api_key: "${{ secrets.HOPSWORKS_API_KEY }}"

          alerts:
            aqi_threshold: 150
            sender_email: "Huzaifa22.edu.pk@gmail.com"
            sender_password: "${{ secrets.EMAIL_APP_PASSWORD }}"
            receiver_email: "z04669289@gmail.com"
          EOF

      - name: Run ingestion and feature pipeline
        run: python jobs/hourly_ingestion.py

      - name: Save latest features for dashboard
        run: |
          python -c "
          import hopsworks, yaml, pandas as pd, os

          with open('config/config.yaml') as f:
              config = yaml.safe_load(f)

          project = hopsworks.login(
              host=config['hopsworks']['host'],
              api_key_value=config['hopsworks']['api_key']
          )

          fs = project.get_feature_store()
          fg = fs.get_feature_group('aqi_features', version=1)
          df = fg.read().sort_values('timestamp')

          os.makedirs('data', exist_ok=True)

          # save only last 50 rows — enough for dashboard home page
          df.tail(50).to_csv('data/latest_features.csv', index=False)

          print(f'Saved last 50 rows')
          print(f'Latest timestamp: {df.timestamp.max()}')
          print(f'Total rows in v1: {len(df)}')
          "

      - name: Commit latest features to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_features.csv
          git diff --staged --quiet || git commit -m "chore: update latest features [skip ci]"
          git push