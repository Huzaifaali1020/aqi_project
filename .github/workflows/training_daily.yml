name: Daily Model Training Pipeline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  training_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install confluent-kafka

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV # current project dir to env variable allow internal import

      - name: Create config.yaml from secrets
        run: |
          mkdir -p config
          cat <<'EOF' > config/config.yaml
          city:
            name: Karachi
            lat: 24.8607
            lon: 67.0011

          api:
            aqi_url: "https://api.waqi.info/feed/karachi/"
            aqi_key: "${{ secrets.AQI_API_KEY }}"
            weather_url: "https://api.openweathermap.org/data/2.5/weather"
            weather_key: "${{ secrets.WEATHER_API_KEY }}"

          hopsworks:
            host: "eu-west.cloud.hopsworks.ai"
            api_key: "${{ secrets.HOPSWORKS_API_KEY }}"

          alerts:
            aqi_threshold: 150
            sender_email: "Huzaifa22.edu.pk@gmail.com"
            sender_password: "${{ secrets.EMAIL_APP_PASSWORD }}"
            receiver_email: "z04669289@gmail.com"
          EOF

      - name: Train model
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          python training/train_and_register.py

      - name: Run forecast and save CSVs
        run: |
          python inference/forecast.py

      - name: Commit fresh forecast CSVs to repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git add data/latest_predictions.csv
          git add data/daily_summary.csv
          git diff --staged --quiet || git commit -m "auto: fresh forecast $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push